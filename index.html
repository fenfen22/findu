<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find-U | Status Check</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #111827; margin-bottom: 0.5rem; }
        p { color: #6b7280; margin-bottom: 2rem; }
        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover { background-color: #0051a8; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Find-U is Live!</h1>
        <p>If you can see this page, your website configuration is working perfectly.</p>
        <button onclick="testApp()">Click to Test Interactivity</button>
    </div>

    <script>
        function testApp() {
            alert("Success! JavaScript is working perfectly on this page.");
        }
    </script>

</body>
</html>
